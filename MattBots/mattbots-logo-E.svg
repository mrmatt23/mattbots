<svg width="300" height="90" viewBox="0 0 300 90" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cyanGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
    <filter id="cyanGlow">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#06b6d4" flood-opacity="0.7"/>
    </filter>
    <filter id="subtleGlow">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#22d3ee" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Dark background for entire logo -->
  <rect width="300" height="90" fill="#0a0f1e" rx="14"/>

  <!-- Subtle grid lines in background -->
  <line x1="0" y1="45" x2="300" y2="45" stroke="rgba(34,211,238,0.06)" stroke-width="1"/>
  <line x1="150" y1="0" x2="150" y2="90" stroke="rgba(34,211,238,0.06)" stroke-width="1"/>

  <!-- Icon: Dark panel with cyan border -->
  <rect x="10" y="13" width="60" height="64" rx="12" fill="#0f1a2e" stroke="#22d3ee" stroke-width="1.5" stroke-opacity="0.6"/>

  <!-- Robot face: cyan glowing elements -->
  <!-- Antenna -->
  <rect x="37" y="5" width="5" height="12" rx="2.5" fill="#22d3ee" opacity="0.8"/>
  <circle cx="39.5" cy="5" r="4" fill="#22d3ee" filter="url(#cyanGlow)"/>

  <!-- Eyes: cyan rounded squares -->
  <rect x="16" y="27" width="13" height="13" rx="3.5" fill="#0f1a2e" stroke="#22d3ee" stroke-width="1.5"/>
  <rect x="51" y="27" width="13" height="13" rx="3.5" fill="#0f1a2e" stroke="#22d3ee" stroke-width="1.5"/>
  <!-- Eye inner glow -->
  <rect x="18" y="29" width="9" height="9" rx="2" fill="url(#cyanGrad)" opacity="0.9" filter="url(#subtleGlow)"/>
  <rect x="53" y="29" width="9" height="9" rx="2" fill="url(#cyanGrad)" opacity="0.9" filter="url(#subtleGlow)"/>

  <!-- Mouth: segmented LED bar -->
  <rect x="16" y="50" width="48" height="8" rx="4" fill="#0f1a2e" stroke="#22d3ee" stroke-width="1" stroke-opacity="0.5"/>
  <rect x="19" y="52" width="9" height="4" rx="2" fill="#22d3ee" opacity="0.9"/>
  <rect x="32" y="52" width="9" height="4" rx="2" fill="#22d3ee" opacity="0.9"/>
  <rect x="45" y="52" width="9" height="4" rx="2" fill="#22d3ee" opacity="0.4"/>

  <!-- Wordmark: white + cyan -->
  <text x="84" y="59" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="38" font-weight="800" letter-spacing="-1.5">
    <tspan fill="#e2e8f0">matt</tspan><tspan fill="#22d3ee" filter="url(#subtleGlow)">bots</tspan>
  </text>
  <!-- Tagline -->
  <text x="85" y="75" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="11" font-weight="400" fill="#475569" letter-spacing="1.5">mattbots.com</text>
</svg>
