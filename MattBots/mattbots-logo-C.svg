<svg width="300" height="90" viewBox="0 0 300 90" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="goldGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#f59e0b" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- White background -->
  <rect width="300" height="90" fill="white"/>

  <!-- Icon: Dark navy rounded square -->
  <rect x="6" y="12" width="62" height="66" rx="16" fill="#0f172a"/>

  <!-- Antenna post + ball -->
  <rect x="34" y="4" width="6" height="12" rx="3" fill="#fbbf24"/>
  <circle cx="37" cy="4" r="5" fill="#fcd34d"/>

  <!-- Eyes: gold rounded squares -->
  <rect x="14" y="28" width="14" height="14" rx="4" fill="#f59e0b" filter="url(#goldGlow)"/>
  <rect x="46" y="28" width="14" height="14" rx="4" fill="#f59e0b" filter="url(#goldGlow)"/>
  <!-- Pupils: dark navy circles -->
  <circle cx="21" cy="35" r="4" fill="#0f172a"/>
  <circle cx="53" cy="35" r="4" fill="#0f172a"/>
  <!-- Shine dots -->
  <circle cx="23" cy="33" r="1.5" fill="#fef3c7"/>
  <circle cx="55" cy="33" r="1.5" fill="#fef3c7"/>

  <!-- Mouth -->
  <rect x="16" y="51" width="42" height="9" rx="4.5" fill="rgba(245,158,11,0.15)"/>
  <rect x="19" y="53" width="10" height="5" rx="2.5" fill="#f59e0b"/>
  <rect x="33" y="53" width="10" height="5" rx="2.5" fill="#f59e0b"/>
  <rect x="47" y="53" width="7" height="5" rx="2.5" fill="rgba(245,158,11,0.55)"/>

  <!-- Wordmark -->
  <text x="82" y="60" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="38" font-weight="800" letter-spacing="-1.5">
    <tspan fill="#0f172a">matt</tspan><tspan fill="#f59e0b">bots</tspan>
  </text>
  <!-- Tagline -->
  <text x="83" y="76" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="11" font-weight="400" fill="#94a3b8" letter-spacing="1.5">mattbots.com</text>
</svg>
