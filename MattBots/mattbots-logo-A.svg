<svg width="300" height="90" viewBox="0 0 300 90" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="blueGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#2563eb" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- White background -->
  <rect width="300" height="90" fill="white" rx="0"/>

  <!-- Icon: Blue rounded square -->
  <rect x="6" y="12" width="62" height="66" rx="16" fill="url(#blueGrad)" filter="url(#softShadow)"/>

  <!-- Antenna post -->
  <rect x="34" y="4" width="6" height="12" rx="3" fill="#93c5fd"/>
  <!-- Antenna ball -->
  <circle cx="37" cy="4" r="5" fill="#bfdbfe"/>

  <!-- Eyes: white rounded squares -->
  <rect x="14" y="28" width="14" height="14" rx="4" fill="white"/>
  <rect x="46" y="28" width="14" height="14" rx="4" fill="white"/>
  <!-- Pupils -->
  <circle cx="21" cy="35" r="4" fill="#1d4ed8"/>
  <circle cx="53" cy="35" r="4" fill="#1d4ed8"/>
  <!-- Pupil shine -->
  <circle cx="23" cy="33" r="1.5" fill="white"/>
  <circle cx="55" cy="33" r="1.5" fill="white"/>

  <!-- Mouth: pill shape with LED segments -->
  <rect x="16" y="51" width="42" height="9" rx="4.5" fill="rgba(255,255,255,0.2)"/>
  <rect x="19" y="53" width="10" height="5" rx="2.5" fill="white"/>
  <rect x="33" y="53" width="10" height="5" rx="2.5" fill="white"/>
  <rect x="47" y="53" width="7" height="5" rx="2.5" fill="rgba(255,255,255,0.6)"/>

  <!-- Wordmark -->
  <text x="82" y="60" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="38" font-weight="800" letter-spacing="-1.5">
    <tspan fill="#0f172a">matt</tspan><tspan fill="#2563eb">bots</tspan>
  </text>
  <!-- Tagline -->
  <text x="83" y="76" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="11" font-weight="400" fill="#94a3b8" letter-spacing="1.5">mattbots.com</text>
</svg>
